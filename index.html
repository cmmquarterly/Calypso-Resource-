<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calypso CMM Training</title>
    <style>
        :root { --primary: #0066cc; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; display: flex; height: 100vh; background: #f5f5f5; }
        .sidebar { width: 320px; background: #1e3a8a; color: white; padding: 20px 0; overflow-y: auto; }
        .sidebar h1 { padding: 0 20px 20px; margin: 0; border-bottom: 1px solid #3b82f6; font-size: 1.4em; }
        .topic { padding: 12px 24px; cursor: pointer; }
        .topic:hover, .topic.active { background: #3b82f6; }
        .main { flex: 1; padding: 20px; overflow-y: auto; background: white; }
        .content { max-width: 900px; line-height: 1.7; }
        .home-btn { background: #0066cc; color: white; padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
        .chapter { margin: 12px 0; padding: 12px; background: #f8f9fa; border-radius: 6px; cursor: pointer; }
        .chapter:hover { background: #e9ecef; }
        .search { padding: 12px; margin: 10px 20px; width: calc(100% - 40px); border: none; border-radius: 6px; }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; max-height: 45vh; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Calypso CMM Training</h1>
        <input type="text" id="search" class="search" placeholder="Search topics..." onkeyup="filterTopics()">
        <div id="topics"></div>
    </div>

    <div class="main">
        <div class="content" id="content">
            <h1>Welcome to Calypso CMM Training</h1>
            <p>Select a topic from the left sidebar to begin.</p>
        </div>
    </div>

    <script>
        const trainingData = {
            "alignments": {
                title: "Alignments & Part Setup",
                content: `
                    <button class="home-btn" onclick="showHome()">← Home</button>
                    <h1>Mastering Datums & CMM Alignments in Calypso</h1>
                    <h2>Table of Contents</h2>
                    <div class="chapter" onclick="loadChapter(1)">Chapter 1: What is a Datum?</div>
                    <div class="chapter" onclick="loadChapter(2)">Chapter 2: Datum Reference Frames (DRF)</div>
                    <div class="chapter" onclick="loadChapter(3)">Chapter 3: Datum Types & Their Behavior</div>
                    <div class="chapter" onclick="loadChapter(4)">Chapter 4: Establishing Basic Alignments</div>
                `
            },
            "cmm_basics": { 
                title: "CMM Basics", 
                content: "<button class='home-btn' onclick='showHome()'>← Home</button><h1>CMM Basics</h1><p>Core principles coming soon...</p>" 
            }
        };

        function renderTopics() {
            const container = document.getElementById('topics');
            container.innerHTML = '';
            Object.keys(trainingData).forEach(key => {
                const topic = trainingData[key];
                const div = document.createElement('div');
                div.className = 'topic';
                div.textContent = topic.title;
                div.onclick = () => showContent(key);
                container.appendChild(div);
            });
        }

        function showContent(key) {
            const data = trainingData[key];
            document.getElementById('content').innerHTML = data.content;
        }

        function loadChapter(ch) {
            let html = `<button class="home-btn" onclick="showHome()">← Home</button><h1>Chapter ${ch}</h1>`;
            if (ch === 1) {
                html += `<p><strong>Defining a Datum</strong></p>
                <p>A datum is an ideal, theoretically exact geometric reference from which measurements are made. ...</p>
                <p><strong>Datum Features and Targets</strong></p>
                <p>Not every feature is used as a whole. Datum targets are specific areas (pads, points, or lines)...</p>
                <p
