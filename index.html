<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calypso CMM Training</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 300px; background: #1e3a8a; color: white; padding: 20px; overflow-y: auto; }
        .main { flex: 1; padding: 30px; overflow-y: auto; background: white; }
        .topic { padding: 12px; cursor: pointer; border-bottom: 1px solid #ccc; }
        .topic:hover { background: #3b82f6; }
        .home-btn { padding: 10px 15px; background: #0066cc; color: white; border: none; border-radius: 5px; margin: 10px 0; cursor: pointer; }
        .chapter { padding: 12px; margin: 8px 0; background: #f0f0f0; border-radius: 6px; cursor: pointer; }
        .chapter:hover { background: #ddd; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Calypso CMM Training</h2>
        <div class="topic" onclick="showAlignments()">Alignments & Part Setup</div>
        <div class="topic" onclick="showBasics()">CMM Basics</div>
    </div>

    <div class="main" id="mainContent">
        <h1>Welcome to Calypso CMM Training</h1>
        <p>Select a topic from the left sidebar.</p>
    </div>

    <script>
        function showHome() {
            document.getElementById('mainContent').innerHTML = `<h1>Welcome to Calypso CMM Training</h1><p>Select a topic from the left sidebar.</p>`;
        }

        function showAlignments() {
            document.getElementById('mainContent').innerHTML = `
                <button class="home-btn" onclick="showHome()">← Home</button>
                <h1>Mastering Datums & CMM Alignments in Calypso</h1>
                <h2>Chapter 1: What is a Datum?</h2>
                <p>A datum is an ideal, theoretically exact geometric reference...</p>
                <h2>Chapter 2: Datum Reference Frames (DRF)</h2>
                <p>The 3-2-1 Rule Explained.</p>
                <h2>Chapter 3: Datum Types & Their Behavior</h2>
                <p>Planes, Axes, Material Condition Modifiers.</p>
                <h2>Chapter 4: Establishing Basic Alignments</h2>
                <p>Step-by-Step Workflow and Best Practices.</p>
            `;
        }

        function showBasics() {
            document.getElementById('mainContent').innerHTML = `
                <button class="home-btn" onclick="showHome()">← Home</button>
                <h1>CMM Basics</h1>
                <p>Core principles coming soon with more content from your materials.</p>
            `;
        }
    </script>
</body>
</html>
