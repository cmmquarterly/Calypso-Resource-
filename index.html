<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calypso CMM Training</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; background: #f5f5f5; }
        .sidebar { width: 320px; background: #1e3a8a; color: white; padding: 20px; overflow-y: auto; }
        .main { flex: 1; padding: 20px; overflow-y: auto; background: white; }
        .topic { padding: 12px; cursor: pointer; border-bottom: 1px solid #ccc; }
        .topic:hover, .topic.active { background: #3b82f6; }
        .home-btn { padding: 10px 15px; background: #0066cc; color: white; border: none; border-radius: 6px; margin-bottom: 15px; cursor: pointer; }
        .chapter { padding: 12px; margin: 8px 0; background: #f0f0f0; border-radius: 6px; cursor: pointer; }
        .chapter:hover { background: #ddd; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Calypso CMM Training</h2>
        <div class="topic" onclick="showAlignments()">Alignments & Part Setup</div>
        <div class="topic" onclick="showBasics()">CMM Basics</div>
    </div>

    <div class="main" id="mainContent">
        <h1>Welcome to Calypso CMM Training</h1>
        <p>Select a topic from the left sidebar.</p>
    </div>

    <script>
        function showHome() {
            document.getElementById('mainContent').innerHTML = `<h1>Welcome to Calypso CMM Training</h1><p>Select a topic from the left sidebar.</p>`;
        }

        function showAlignments() {
            document.getElementById('mainContent').innerHTML = `
                <button class="home-btn" onclick="showHome()">← Home</button>
                <h1>Mastering Datums & CMM Alignments in Calypso</h1>
                <h2>Table of Contents</h2>
                <div class="chapter" onclick="loadChapter(1)">Chapter 1: What is a Datum?</div>
                <div class="chapter" onclick="loadChapter(2)">Chapter 2: Datum Reference Frames (DRF)</div>
                <div class="chapter" onclick="loadChapter(3)">Chapter 3: Datum Types & Their Behavior</div>
                <div class="chapter" onclick="loadChapter(4)">Chapter 4: Establishing Basic Alignments</div>
                <div class="chapter" onclick="loadChapter(5)">Chapter 5: Common Alignment Strategies</div>
                <div class="chapter" onclick="loadChapter(6)">Chapter 6: Advanced Datum Alignment Concepts</div>
                <div class="chapter" onclick="loadChapter(7)">Chapter 7: Advanced Alignments</div>
                <div class="chapter" onclick="loadChapter(8)">Chapter 8: Best CMM Practices</div>
                <div class="chapter" onclick="loadChapter(9)">Chapter 9: Troubleshooting Alignment Errors</div>
                <div class="chapter" onclick="loadChapter(10)">Chapter 10: CMM Alignment Strategies</div>
                <div class="chapter" onclick="loadChapter(11)">Chapter 11: Measurement Uncertainty and Datums</div>
                <div class="chapter" onclick="loadChapter(12)">Chapter 12: Fixturing & Workholding Considerations</div>
                <div class="chapter" onclick="loadChapter(13)">Chapter 13: Reporting & Communication</div>
            `;
        }

        function loadChapter(ch) {
            let html = `<button class="home-btn" onclick="showHome()">← Home</button><h1>Chapter ${ch}</h1>`;
            if (ch === 1) html += `<p>Every measurement needs a reference. A datum is an ideal, theoretically exact geometric reference... Full content: Defining a Datum, Datum Features and Targets, ISO vs ASME, Functional Role of Datums.</p>`;
            else if (ch === 2) html += `<p>The 3-2-1 Rule, Primary/Secondary/Tertiary hierarchies, Simulated DRFs in CMMs.</p>`;
            else if (ch === 3) html += `<p>Common Datum Types, Material Condition Modifiers, Stability, Form Errors, Patterns as Datums, Tangent Plane.</p>`;
            else if (ch === 4) html += `<p>Manual vs CAD-based, Fixture vs Datum Alignment, Step-by-Step Workflow, Datum Targets.</p>`;
            else if (ch === 5) html += `<p>Plane-Plane, Cylinder Axis, Plane/Circle/Line, Pattern-Based Alignment, etc.</p>`;
            else if (ch === 6) html += `<p>Shift and Mobility, Composite DRFs, Outer Tangential Evaluation, Free-State Measurement.</p>`;
            else if (ch === 7) html += `<p>3D Best-Fit, Iterative Alignments, RPS Alignment, Alignment from Several Curves.</p>`;
            else if (ch === 8) html += `<p>Environment and Calibration, Probe Paths, Workholding, Validate Every Alignment.</p>`;
            else if (ch === 9) html += `<p>Symptoms of Alignment Problems, Root Causes, Systematic Troubleshooting.</p>`;
            else if (ch === 10) html += `<p>Understanding Measurement Intent, Logical Layers, Gage R&R.</p>`;
            else if (ch === 11) html += `<p>Measurement Uncertainty, Sources in Datum-Driven Alignments, ISO 10360-2.</p>`;
            else if (ch === 12) html += `<p>Goals of Fixturing, Common Workholding Methods, Environmental Considerations.</p>`;
            else if (ch === 13) html += `<p>Goals of Measurement Reporting, Essential Elements of a CMM Report.</p>`;
            document.getElementById('mainContent').innerHTML = html;
        }

        function showBasics() {
            document.getElementById('mainContent').innerHTML = `
                <button class="home-btn" onclick="showHome()">← Home</button>
                <h1>CMM Basics</h1>
                <p>Fundamentals, probe types, calibration, and more coming soon.</p>
            `;
        }
    </script>
</body>
</html>
