<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMM Training Reference</title>
    <style>
        :root {
            --primary: #0066cc;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            height: 100vh;
            background: #f5f5f5;
        }
        .sidebar {
            width: 280px;
            background: #1e3a8a;
            color: white;
            padding: 20px 0;
            overflow-y: auto;
        }
        .sidebar h1 {
            padding: 0 20px 20px;
            margin: 0;
            border-bottom: 1px solid #3b82f6;
        }
        .topic {
            padding: 12px 24px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .topic:hover, .topic.active {
            background: #3b82f6;
        }
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: white;
        }
        .content h1, .content h2 {
            color: var(--primary);
        }
        .content {
            max-width: 900px;
            line-height: 1.7;
        }
        .search {
            padding: 12px;
            margin: 10px 20px;
            width: calc(100% - 40px);
            border: none;
            border-radius: 6px;
        }
        .subtopic {
            margin-left: 20px;
            padding: 8px 20px;
            font-size: 0.95em;
            opacity: 0.9;
        }

        /* Mobile improvements */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 40vh;
            }
            .main {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>CMM Training</h1>
        <input type="text" id="search" class="search" placeholder="Search topics..." onkeyup="filterTopics()">
        
        <div id="topics"></div>
    </div>

    <div class="main">
        <div class="content" id="content">
            <h1>Welcome to CMM Training Reference</h1>
            <p>Select a topic from the left to begin.</p>
            <p>This app works great offline on iPad and phones.</p>
        </div>
    </div>

    <script>
        // ==================== TRAINING CONTENT ====================
        const trainingData = {
            "cmm_basics": {
                title: "CMM Basics",
                content: `
                    <h1>Coordinate Measuring Machine Fundamentals</h1>
                    <p>Core principles of CMM operation, types of machines, and key terminology.</p>
                    <h2>Key Concepts</h2>
                    <ul>
                        <li>Cartesian Coordinate System</li>
                        <li>Probe Types (Touch Trigger, Scanning, Optical)</li>
                        <li>Machine Calibration & Qualification</li>
                    </ul>
                `
            },
            "alignments": {
                title: "Alignments & Part Setup",
                content: `
                    <h1>Alignments in CMM Programming</h1>
                    <p>Best practices for robust part alignments.</p>
                    <h2>Common Alignment Types</h2>
                    <ul>
                        <li>3-2-1 Alignment</li>
                        <li>Best-Fit Alignments</li>
                        <li>Model-Based Definition (MBD) Alignments</li>
                    </ul>
                `
            },
            "gd_t": {
                title: "GD&amp;T (Geometric Dimensioning &amp; Tolerancing)",
                content: `
                    <h1>GD&amp;T Fundamentals &amp; Application</h1>
                    <p>Applying ASME Y14.5 standards on the CMM.</p>
                `
            },
            "calypso": {
                title: "ZEISS Calypso",
                content: `
                    <h1>Calypso Best Practices</h1>
                    <p>Model-Based Definition workflows, advanced strategies, and tips.</p>
                `
            }
        };

        function renderTopics(filteredData = trainingData) {
            const container = document.getElementById('topics');
            container.innerHTML = '';
            
            Object.keys(filteredData).forEach(key => {
                const topic = filteredData[key];
                const div = document.createElement('div');
                div.className = 'topic';
                div.textContent = topic.title;
                div.onclick = () => showContent(key);
                container.appendChild(div);
            });
        }

        function showContent(key) {
            const data = trainingData[key];
            if (!data) return;
            
            document.getElementById('content').innerHTML = data.content;
            
            document.querySelectorAll('.topic').forEach(t => {
                t.classList.toggle('active', t.textContent === data.title);
            });
        }

        function filterTopics() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = {};
            
            Object.keys(trainingData).forEach(key => {
                if (trainingData[key].title.toLowerCase().includes(term)) {
                    filtered[key] = trainingData[key];
                }
            });
            renderTopics(filtered);
        }

        window.onload = () => {
            renderTopics();
        };
    </script>
</body>
</html>
