<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calypso CMM Training</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        h1 { color: #0066cc; }
        button { padding: 12px 20px; background: #0066cc; color: white; border: none; border-radius: 6px; margin: 10px 0; font-size: 16px; }
        .chapter { padding: 15px; background: white; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>Calypso CMM Training</h1>
    <button onclick="showHome()">← Home</button>

    <h2>Mastering Datums & CMM Alignments in Calypso</h2>
    <div class="chapter" onclick="loadChapter(1)">Chapter 1: What is a Datum?</div>
    <div class="chapter" onclick="loadChapter(2)">Chapter 2: Datum Reference Frames (DRF)</div>
    <div class="chapter" onclick="loadChapter(3)">Chapter 3: Datum Types & Their Behavior</div>
    <div class="chapter" onclick="loadChapter(4)">Chapter 4: Establishing Basic Alignments</div>

    <div id="chapterContent"></div>

    <script>
        function showHome() {
            document.getElementById('chapterContent').innerHTML = '<p>Select a chapter above.</p>';
        }

        function loadChapter(ch) {
            let text = '';
            if (ch === 1) text = '<h2>Chapter 1: What is a Datum?</h2><p>Every measurement needs a reference. A datum is an ideal, theoretically exact geometric reference from which measurements are made.</p><p>Datum feature vs Simulated datum. ISO vs ASME standards.</p>';
            else if (ch === 2) text = '<h2>Chapter 2: Datum Reference Frames (DRF)</h2><p>The 3-2-1 Rule: Primary (3 points), Secondary (2 points), Tertiary (1 point).</p>';
            else if (ch === 3) text = '<h2>Chapter 3: Datum Types & Their Behavior</h2><p>Planes, Axes, Points, Lines, Material Condition Modifiers (MMC, RFS).</p>';
            else if (ch === 4) text = '<h2>Chapter 4: Establishing Basic Alignments</h2><p>Manual vs CAD-based. Fixture vs Datum Alignment. Step-by-Step Workflow.</p>';

            document.getElementById('chapterContent').innerHTML = text;
        }
    </script>
</body>
</html>
