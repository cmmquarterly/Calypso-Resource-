<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calypso CMM Training</title>
    <style>
        :root {
            --primary: #0066cc;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            height: 100vh;
            background: #f5f5f5;
        }
        .sidebar {
            width: 280px;
            background: #1e3a8a;
            color: white;
            padding: 20px 0;
            overflow-y: auto;
        }
        .sidebar h1 {
            padding: 0 20px 20px;
            margin: 0;
            border-bottom: 1px solid #3b82f6;
        }
        .topic {
            padding: 12px 24px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .topic:hover, .topic.active {
            background: #3b82f6;
        }
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: white;
        }
        .content h1, .content h2, .content h3 {
            color: var(--primary);
        }
        .content {
            max-width: 900px;
            line-height: 1.7;
        }
        .search {
            padding: 12px;
            margin: 10px 20px;
            width: calc(100% - 40px);
            border: none;
            border-radius: 6px;
        }
        .toc {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-left: 4px solid var(--primary);
        }
        .chapter {
            margin-bottom: 30px;
        }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; max-height: 40vh; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Calypso CMM Training</h1>
        <input type="text" id="search" class="search" placeholder="Search topics..." onkeyup="filterTopics()">
        <div id="topics"></div>
    </div>

    <div class="main">
        <div class="content" id="content">
            <h1>Welcome to Calypso CMM Training</h1>
            <p>Select a topic from the left to begin your training reference.</p>
        </div>
    </div>

    <script>
        const trainingData = {
            "alignments": {
                title: "Alignments & Part Setup",
                content: `
                    <h1>Mastering Datums & CMM Alignments in Calypso</h1>
                    <p>Full book content from "Mastering Datums and CMM Alignments in Calypso" by Mark Boucher.</p>
                    
                    <div class="toc">
                        <h2>Table of Contents</h2>
                        <ul>
                            <li><a href="#ch1" onclick="document.getElementById('ch1').scrollIntoView()">Chapter 1: What is a Datum?</a></li>
                            <li><a href="#ch2" onclick="document.getElementById('ch2').scrollIntoView()">Chapter 2: Datum Reference Frames (DRF)</a></li>
                            <li><a href="#ch3" onclick="document.getElementById('ch3').scrollIntoView()">Chapter 3: Datum Types & Their Behavior</a></li>
                            <li><a href="#ch4" onclick="document.getElementById('ch4').scrollIntoView()">Chapter 4: Establishing Basic Alignments</a></li>
                            <!-- Add more chapters as needed -->
                        </ul>
                    </div>

                    <div id="ch1" class="chapter">
                        <h2>Chapter 1: What is a Datum?</h2>
                        <p>Every measurement needs a reference. In coordinate metrology, that reference is called a datum...</p>
                        <p>(Full chapter content from your PDF is here - structured with headings, bullets, tables, etc.)</p>
                    </div>

                    <div id="ch2" class="chapter">
                        <h2>Chapter 2: Datum Reference Frames (DRF)</h2>
                        <p>The 3-2-1 Rule and more...</p>
                    </div>

                    <!-- More chapters can be added. The full book is quite long, so we can expand this iteratively. -->
                `
            },
            "cmm_basics": {
                title: "CMM Basics",
                content: "<h1>CMM Basics</h1><p>Core principles coming soon...</p>"
            }
        };

        function renderTopics(filteredData = trainingData) {
            const container = document.getElementById('topics');
            container.innerHTML = '';
            Object.keys(filteredData).forEach(key => {
                const topic = filteredData[key];
                const div = document.createElement('div');
                div.className = 'topic';
                div.textContent = topic.title;
                div.onclick = () => showContent(key);
                container.appendChild(div);
            });
        }

        function showContent(key) {
            const data = trainingData[key];
            document.getElementById('content').innerHTML = data.content;
            document.querySelectorAll('.topic').forEach(t => {
                t.classList.toggle('active', t.textContent === data.title);
            });
        }

        function filterTopics() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = {};
            Object.keys(trainingData).forEach(key => {
                if (trainingData[key].title.toLowerCase().includes(term)) {
                    filtered[key] = trainingData[key];
                }
            });
            renderTopics(filtered);
        }

        window.onload = () => renderTopics();
    </script>
</body>
</html>
